version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: parking_postgres
    restart: always
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
